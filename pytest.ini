[pytest]
# Configuração do pytest para o Gerador de Manuais Automático

# Diretório de testes
testpaths = tests

# Padrão de nomes de arquivo de teste
python_files = test_*.py

# Padrão de nomes de classe de teste
python_classes = Test*

# Padrão de nomes de função de teste
python_functions = test_*

# Adicionar flags de linha de comando padrão
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Mostrar prints em tempo real
log_cli = false
log_cli_level = INFO

# Filtros de avisos
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
